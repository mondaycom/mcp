on: pull_request
name: Pull Request
jobs:
  validate:
    name: Run validations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
        with:
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.18.1'
      - name: Install Yarn
        run: npm install -g yarn@1.22.21
      - run: yarn install
      - run: yarn prettier
      - run: yarn lint

      - name: Build packages
        run: yarn build

      - name: Test packages
        run: yarn test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install snapshot testing dependencies
        run: pip install -r integration/requirements.txt

      - name: Verify snapshot tests
        run: |
          mcp-recorder verify \
            --cassette integration/cassettes/list_tools.json \
            --target-stdio "node packages/monday-api-mcp/dist/index.js" \
            --target-env MONDAY_TOKEN=test-token
